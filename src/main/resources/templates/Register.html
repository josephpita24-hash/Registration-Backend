<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Notes</title>
    <link rel="stylesheet" href="style.css">

    <script>
        async function RegisterUser() {
            // 1. Grab values from the DOM
            const userEmail = document.getElementById("UserEmail").value;
            const userName = document.getElementById("Name").value;
            const role = document.getElementById("Role").value;
            const password = document.getElementById("password").value;

            try {
                // 2. Make the API request
                const response = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userEmail: userEmail,
                        userName: userName,
                        userRole: role,
                        userPassword: password
                    })
                });

                // 3. Check if the server returned a bad status (4xx or 5xx)
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.Message || "Something went wrong during registration!");
                }

                // 4. Properly AWAIT the JSON parsing
                const data = await response.json();

                // 5. Store the token and notify the user
                if (data.SessionToken) {
                    sessionStorage.setItem("authToken", data.SessionToken);
                    alert("Registration successful!" + data.SessionToken);
                } else {
                    alert("Registered, but no session token was received.");
                }

            } catch (error) {
                // Catches network errors AND the errors we manually throw above
                console.error("Registration Error:", error);
                alert(error.message || error);
            }
        }
    </script>

    <style>
        /* ==========================================================================
   1. DESIGN SYSTEM VARIABLES & RESET
   ========================================================================== */
        :root {
            /* Color Palette */
            --bg-app: #f8fafc;
            --bg-surface: #ffffff;
            --border-color: #e2e8f0;

            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            --accent: #4f46e5;
            /* Modern Indigo */
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;

            /* Layout Tokens */
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: all 0.2s ease-in-out;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-app);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
            padding: 1.5rem;
        }

        /* Links global behavior */
        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* ==========================================================================
   2. LAYOUT ARCHITECTURE
   ========================================================================== */
        #LoginPages {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;

        }

        #LoginPane {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            align-items: center;
        }

        /* App Identity Header */
        #applogo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            justify-content: center;
        }

        #applogo span {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary);
        }

        #headerwords {
            margin-bottom: 2rem;
            text-align: center;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9375rem;
        }

        /* ==========================================================================
   3. FORMS & INPUTS
   ========================================================================== */
        #loginform {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        /* Native styling fix for checkbox alignment */
        input[type="checkbox"] {
            cursor: pointer;
        }

        /* ==========================================================================
   4. BUTTONS & UI COMPONENTS
   ========================================================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            border: 1px solid transparent;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--bg-surface);
            border-color: var(--border-color);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .btn-secondary:hover {
            background-color: var(--bg-app);
            color: var(--text-primary);
            border-color: var(--text-muted);
        }

        /* Custom Dividers */
        .login-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8125rem;
            text-transform: lowercase;
            letter-spacing: 0.05em;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid var(--border-color);
        }

        .login-divider:not(:empty)::before {
            margin-right: .75em;
        }

        .login-divider:not(:empty)::after {
            margin-left: .75em;
        }

        /* ==========================================================================
   5. FOOTER ARCHITECTURE
   ========================================================================== */
        .login-footer {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;

        }
    </style>
</head>

<body>
    <section id="LoginPages">
        <section id="LoginPane">
            <div id="applogo">
                <img src="imges/Notes.png" alt="" style="width: 52px;">
                <span>Notes</span>
            </div>
            <div id="headerwords">
                <h1 class="login-title">Register On Notes</h1>
                <p class="login-subtitle">Please Complete Registration to continue</p>
            </div>
            <div>
                <div id="loginform">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" placeholder="you@example.com" required id="UserEmail">
                    </div>

                    <div class="form-group">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label class="form-label" style="margin-bottom: 0;">User Name</label>
                        </div>
                        <input type="text" class="form-input" placeholder="Joseph" required id="Name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">User Role</label>
                        <input type="text" class="form-input" placeholder="ADMIN , USER" required id="Role">
                    </div>

                    <div class="form-group">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label class="form-label" style="margin-bottom: 0;">Password</label>
                        </div>
                        <input type="password" class="form-input" placeholder="Enter your password" required
                            id="password">
                    </div>


                    <button type="submit" class="btn btn-primary" onclick="RegisterUser()">
                        Register
                    </button>
                </div>
            </div>
            <div class="login-divider">
                <span>or continue with</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;">
                <button class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" width="18" height="18">

                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="currentColor"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="currentColor"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="currentColor"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <a th:href="@{/oauth2/authorization/google}" style=" color: #4f46e5;
                    text-decoration: none;
                    font-weight: 500;
                    transition: var(--transition);"> Google </a>
                </button>
                <button class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    <a href="/oauth2/authorization/github" style=" color: #4f46e5;
                    text-decoration: none;
                    font-weight: 500;
                    transition: var(--transition);">GitHub</a>
                </button>
            </div>

            <p class="login-footer">
                Already have an account? <a href="/login">Sign in for free</a>
            </p>
            </div>
        </section>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.8125rem; color: var(--text-secondary);">
            &copy; 2026 Mohere Camp. Designed by <a href="https://www.templatemo.com" target="_blank" rel="nofollow"
                style="color: var(--accent);">Mohere</a>
        </p>
    </section>
</body>

</html>
