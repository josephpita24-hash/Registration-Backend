<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        /* ==========================================================================
   1. DESIGN SYSTEM VARIABLES (Kept consistent with modern login systems)
   ========================================================================== */
        :root {
            --bg-surface: #ffffff;
            --border-color: #e2e8f0;

            --text-primary: #0f172a;
            --text-secondary: #475569;

            --accent-destructive: #ef4444;
            /* Soft Red for logout */
            --accent-destructive-hover: #dc2626;
            --accent-interactive: #4f46e5;
            /* Primary Indigo */
            --accent-interactive-hover: #4338ca;

            --radius-md: 8px;
            --transition: all 0.2s ease-in-out;
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* ==========================================================================
   2. DASHBOARD PAGE ARCHITECTURE
   ========================================================================== */
        #DashboardPage {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem 2rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 600;
            /* Layout split: Typography left, Actions right */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;

            max-width: 1200px;
            width: 100%;
            margin: 5rem auto;
        }

        /* Welcome Typography */
        #Welcome h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text-primary);
            line-height: 1.2;
        }

        /* ==========================================================================
   3. ACTION OPTIONS & BUTTONS
   ========================================================================== */
        #Options {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            /* Prevents action buttons from wrapping awkwardly */
        }

        /* Base interactive button styling */
        #Options button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            outline: none;
            white-space: nowrap;
        }

        /* Standardizing the dynamic action classes */
        #Options button:focus-visible {
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.4);
        }

        /* Target ID with spacing (escaped CSS identifier rule) */
        #Options #Update\ Password {
            background-color: var(--accent-interactive);
            color: #ffffff;
        }

        #Options #Update\ Password:hover {
            background-color: var(--accent-interactive-hover);
        }

        /* Target Logout Action */
        #Options #Logout {
            background-color: transparent;
            border-color: var(--border-color);
            color: var(--text-secondary);
        }

        #Options #Logout:hover {
            background-color: #fef2f2;
            /* Soft red tint on hover */
            border-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-destructive);
        }

        /* ==========================================================================
   4. RESPONSIVE DESIGN (Mobile Breakdown)
   ========================================================================== */
        @media (max-width: 640px) {
            #DashboardPage {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
                padding: 1.5rem;
            }

            #Options {
                width: 100%;
                flex-direction: column-reverse;
                /* Stack buttons logically on mobile */
            }

            #Options button {
                width: 100%;
            }
        }

        /* ==========================================================================
   1. DESIGN SYSTEM VARIABLES (Brand Cohesion)
   ========================================================================== */
        :root {
            --bg-surface: #ffffff;
            --border-color: #e2e8f0;

            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            --accent: #4f46e5;
            /* Modern Indigo */
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;

            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: all 0.2s ease-in-out;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        /* ==========================================================================
   2. MODULE CONTAINER ARCHITECTURE
   ========================================================================== */
        #UpdatePassword {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 2.5rem 2rem;

            width: 100%;
            max-width: 460px;
            /* Optimal layout width for narrow forms */
            margin: 2rem auto;
        }

        /* Header Section */
        #UpdatePassword h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-primary);
            margin-bottom: 2rem;
            position: relative;
            text-align: center;
        }



        /* ==========================================================================
   3. FORM FIELDS & INTERACTIVE STATES
   ========================================================================== */
        #UpdatePassword div {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            /* Consistently spaces form-groups without compounding margins */
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            transition: var(--transition);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Accessible & Modern Focus States */
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        /* ==========================================================================
   4. PRIMARY SUBMIT ACTION
   ========================================================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            font-size: 0.9375rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            border: 1px solid transparent;
            outline: none;
            margin-top: 0.5rem;
            /* Pushes the button slightly away from fields */
        }

        .btn-primary {
            background-color: var(--accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-primary:focus-visible {
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        /* ==========================================================================
   5. RESPONSIVE SCALE
   ========================================================================== */
        @media (max-width: 480px) {
            #UpdatePassword {
                padding: 1.75rem 1.25rem;
                border: none;
                /* Strips container borders on small screens for a flush web-app feel */
                box-shadow: none;
                background-color: transparent;
            }
        }

        /* Full-screen blur overlay wrapper */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            /* Darkens the main app background */
            backdrop-filter: blur(8px);
            /* Smoothly blurs everything behind it */
            -webkit-backdrop-filter: blur(8px);
            /* Safari support */
            display: flex;
            align-items: center;
            z-index: 1000;
            /* Layer it safely above headers and cards */

            /* Hidden state defaults */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }

        /* Internal modal scale animation */
        .modal-overlay #UpdatePassword {
            transform: scale(0.9);
            transition: transform 0.3s ease-in-out;
        }

        /* Active State: When visible */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
            /* Re-enables clicking inside the modal */
        }

        /* Scale up the modal card smoothly when active */
        .modal-overlay.active #UpdatePassword {
            transform: scale(1);
        }

        /* Design Tokens / System Variables */
        :root {
            --th-bg: #f8fafc;
            /* Soft slate gray for headers */
            --th-text: #475569;
            /* Darker slate for crisp text contrast */
            --td-text: #1e293b;
            /* Deep charcoal for excellent readability */
            --border-color: #e2e8f0;
            /* Clean, subtle borders */
            --row-hover: #f1f5f9;
            /* Light feedback highlight on hover */
            --row-striped: #fafafa;
            /* Zebra striping tint */
            --radius: 8px;

            /* Status Badge Colors */
            --badge-enabled-bg: #dcfce7;
            --badge-enabled-text: #166534;
            --badge-disabled-bg: #fee2e2;
            --badge-disabled-text: #991b1b;
        }

        /* Wrapper to handle horizontal responsiveness beautifully */
        .table-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        /* The Core Table Styling */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            /* Prevents awkward double-border spacing */
            text-align: left;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.925rem;
        }

        /* Header Styling */
        .data-table thead {
            background-color: var(--th-bg);
            border-bottom: 2px solid var(--border-color);
        }

        .data-table th {
            color: var(--th-text);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
        }

        /* Body & Cell Styling */
        .data-table td {
            color: var(--td-text);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        /* Alternating Row Colors (Zebra Striping) for data clarity */
        .data-table tbody tr:nth-child(even) {
            background-color: var(--row-striped);
        }

        /* Smooth Interactive Hover Effect */
        .data-table tbody tr {
            transition: background-color 0.15s ease;
        }

        .data-table tbody tr:hover {
            background-color: var(--row-hover);
        }

        /* Remove bottom border on the very last row to respect the container radius */
        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Custom Status Pill Badges for 'isEnable' */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 9999px;
            /* Pill shape */
        }

        .status-badge.enabled {
            background-color: var(--badge-enabled-bg);
            color: var(--badge-enabled-text);
        }

        .status-badge.disabled {
            background-color: var(--badge-disabled-bg);
            color: var(--badge-disabled-text);
        }

        /* Progress Bar Container layout */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .loading-container p {
            color: #4b5563;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        /* The Background Track of the Bar */
        .progress-track {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background-color: #e2e8f0;
            /* Soft gray track */
            border-radius: 9999px;
            overflow: hidden;
            /* Clips the inner moving bar cleanly */
        }

        /* The Animated Color Bar */
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #4f46e5;
            /* Matches your dashboard indigo theme */
            border-radius: 9999px;
            /* Initial fake loading animation loop */
            animation: simulateLoading 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Smoothly animate the bar to 90% while waiting for network response */
        @keyframes simulateLoading {
            0% {
                width: 0%;
            }

            30% {
                width: 40%;
            }

            70% {
                width: 75%;
            }

            100% {
                width: 90%;
            }
        }

        /* Utility classes to cleanly toggle visibility */
        .hidden {
            display: none !important;
        }
    </style>
    <script>
        // dashboard.js
        document.addEventListener("DOMContentLoaded", async () => {

            const loadingContainer = document.getElementById("loading-container");
            const progressBar = document.getElementById("progress-bar");
            const dataContainer = document.getElementById("data-container");
            const datatable = document.getElementById("tableView");

            try {
                const response = await fetch("/auth/userData");

                if (response.ok) {
                    const userProfile = await response.json();

                    // 1. Force the progress bar to fill instantly on successful fetch
                    progressBar.style.animation = "none";
                    progressBar.style.width = "100%";

                    // 2. Short 200ms delay so the user catches the complete visual animation
                    setTimeout(() => {
                        // Hide the loading state and reveal your data container
                        if (loadingContainer) loadingContainer.classList.add("hidden");
                        if (dataContainer) dataContainer.classList.remove("hidden");

                        // 3. Greet the user after successful fetch
                        document.getElementById("greeting").innerText = `Hi ${userProfile.userName}! Welcome to Dashboard`;

                        // Determine badge style dynamically based on boolean string/value
                        const isUserEnabled = userProfile.isEnable;
                        const badgeClass = isUserEnabled === true || String(isUserEnabled).toLowerCase() === 'true' ? 'enabled' : 'disabled';
                        const statusText = isUserEnabled === true || String(isUserEnabled).toLowerCase() === 'true' ? 'Active' : 'Disabled';

                        // Inject the beautifully styled table
                        datatable.innerHTML = `
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>UserName</th>
                                <th>UserEmail</th>
                                <th>UserRole</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${userProfile.userName}</td>
                                <td>${userProfile.userEmail}</td>
                                <td>${userProfile.userRole}</td>
                                <td><span class="status-badge ${badgeClass}">${statusText}</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
                    }, 200);

                } else {
                    // Handle HTTP error statuses (like 401, 403, 500)
                    progressBar.style.backgroundColor = "#ef4444"; // Turn bar red on failure
                    const errorData = await response.json();
                    alert(JSON.stringify(errorData));
                }
            } catch (error) {
                console.error("Failed to load dashboard data:", error);
                if (loadingContainer) {
                    loadingContainer.innerHTML = `<p style="color: #ef4444; font-weight: 600;">Failed to load user profile. Connection refused.</p>`;
                }
            }
        });

        async function ChangePassword() {
            const CurrentPassword = document.getElementById("CurrentPassword").value;
            const Newpassword = document.getElementById("newPassword").value;
            const ComfimPassword = document.getElementById("ComfimPassword").value;

            if (Newpassword !== ComfimPassword) {
                alert("Please make sure New Password equals Confirm Password");
                return;
            }

            try {
                const response = await fetch("/auth/updatepassword", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        currentPassword: CurrentPassword,
                        newPassword: Newpassword,
                        comfimPassowrd: ComfimPassword // Double-check your backend spelling here!
                    })
                });

                const returndata = await response.json();

                alert(JSON.stringify(returndata.Message));

            } catch (error) {
                alert("An error occurred: " + error);
            }
        }

        function openmodal() {
            const modalOverlay = document.getElementById("modal-overlay");
            modalOverlay.classList.add('active');
        }
    </script>
</head>

<body>
    <section id="DashboardPage">
        <div id="Welcome">
            <h1 id="greeting">Welcome Joseph, happy to see you!</h1>
        </div>
        <div id="Options">
            <button id="Update Password" onclick="openmodal()">Update Password</button>
            <button id="Logout"><a href="/logout" style=" color: #4f46e5;
                text-decoration: none;
                font-weight: 500;
                transition: var(--transition);">Logout</a></button>

        </div>
    </section>
    <section id="tableView">

    </section>

    <div id="loading-container" class="loading-container">
        <p>Fetching secure user profile...</p>
        <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div id="data-container" class="table-container hidden">
    </div>
    <section class="modal-overlay" id="modal-overlay">
        <section id="UpdatePassword">
            <div>
                <h1>Update Password</h1>
            </div>
            <div>
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-input" placeholder="Enter your Current Password" required
                        id="CurrentPassword">
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" placeholder="Enter your New password" required
                        id="newPassword">
                </div>
                <div class="form-group">
                    <label class="form-label">Comfim Password</label>
                    <input type="password" class="form-input" placeholder="Comfim Password" required
                        id="ComfimPassword">
                </div>
                <button type="button" class="btn btn-primary" onclick="ChangePassword()">
                    Change Password
                </button>
            </div>
        </section>
    </section>

</body>

</html>
